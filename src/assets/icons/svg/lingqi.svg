<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feOffset in="blur" dx="0" dy="8" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.15" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Shape -->
  <rect x="56" y="56" width="400" height="400" rx="90" ry="90" fill="url(#bgGradient)" filter="url(#softShadow)" />
  
  <!-- Character '灵' -->
  <!-- Using a group to center and potentially add effects -->
  <g transform="translate(256, 280)">
    <text text-anchor="middle" dominant-baseline="middle" 
          font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif" 
          font-size="240" 
          font-weight="bold" 
          fill="#ffffff"
          style="text-shadow: 0px 4px 10px rgba(0,0,0,0.1);">
      灵
    </text>
  </g>
</svg>